name: Deploy

# Deploy runs ONLY after the CI workflow completes successfully on main.
# This avoids duplicate parallel runs on a main push and guarantees that
# nothing deploys if typecheck/lint/test/build failed.
#
# Triggers:
#   - workflow_run: when "CI" finishes on branch `main` with conclusion `success`.
#   - workflow_dispatch: manual run from the Actions tab (skips the CI gate).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # The workflow_run trigger fires on ANY conclusion (failure, success,
    # cancelled). Gate explicitly so deploys only happen on green CI runs.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Apply production migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACC_ID }}
        run: npm run db:migrate:remote

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACC_ID }}
        run: npm run deploy

      - name: Deploy scheduler Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACC_ID }}
        run: npm run deploy:scheduler
